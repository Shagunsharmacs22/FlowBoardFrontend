<div class="page-content-inner">
  <div class="page-top"><div><h1>Reports &amp; Exports</h1><p>Download your financial data</p></div></div>
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><span class="card-title">Export Data</span></div>
      <div class="card-body">
        <div class="form-group"><label class="form-label">Date Range</label>
          <div class="form-row">
            <input class="form-control" type="date" value="2026-04-01"/>
            <input class="form-control" type="date" value="2026-04-30"/>
          </div>
        </div>
        <div class="form-group"><label class="form-label">Report Type</label>
          <select class="form-control"><option>All Transactions</option><option>Expenses Only</option><option>Income Only</option><option>Monthly Summary</option></select>
        </div>
        <div style="display:flex;gap:10px;margin-top:12px">
          <button class="btn btn-primary">⬇️ Export CSV</button>
          <button class="btn btn-outline">📄 Export PDF Report</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Monthly Summary Email</span></div>
      <div class="card-body">
        <div style="background:var(--primary-light);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:var(--primary-dark)">
          <strong>Auto Email is Active</strong><br/>A monthly financial digest is sent to your email on the 1st of every month.
        </div>
        <div class="form-group"><label class="form-label">Email Address</label><input class="form-control" value="john@example.com"/></div>
        <button class="btn btn-outline">Send Test Email</button>
      </div>
    </div>
  </div>
</div>
