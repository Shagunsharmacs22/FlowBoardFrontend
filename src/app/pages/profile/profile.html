<div class="page-content-inner">
  <div class="page-top"><div><h1>Profile Settings</h1><p>Manage your account and preferences</p></div></div>
  <div class="grid-2">
    <div class="card">
      <div class="card-header"><span class="card-title">Personal Information</span></div>
      <div class="card-body">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
          <div style="width:64px;height:64px;border-radius:50%;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--primary-dark)">JD</div>
          <div><button class="btn btn-outline btn-sm">Change Avatar</button></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">First Name</label><input class="form-control" value="John"/></div>
          <div class="form-group"><label class="form-label">Last Name</label><input class="form-control" value="Doe"/></div>
        </div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-control" value="john@example.com"/></div>
        <div class="form-group"><label class="form-label">Bio</label><textarea class="form-control" rows="2" placeholder="A short bio..."></textarea></div>
        <div class="form-actions"><button class="btn btn-primary">Save Changes</button></div>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-header"><span class="card-title">Preferences</span></div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group"><label class="form-label">Display Currency</label><select class="form-control"><option>USD ($)</option><option>EUR (€)</option><option>INR (₹)</option><option>GBP (£)</option></select></div>
            <div class="form-group"><label class="form-label">Timezone</label><select class="form-control"><option>Asia/Kolkata</option><option>America/New_York</option><option>Europe/London</option></select></div>
          </div>
          <div class="form-group"><label class="form-label">Monthly Budget Goal ($)</label><input class="form-control" value="6000"/></div>
          <div class="form-actions"><button class="btn btn-primary">Save Preferences</button></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Security</span></div>
        <div class="card-body">
          <div class="form-group"><label class="form-label">Current Password</label><input class="form-control" type="password" placeholder="••••••••"/></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">New Password</label><input class="form-control" type="password" placeholder="••••••••"/></div>
            <div class="form-group"><label class="form-label">Confirm Password</label><input class="form-control" type="password" placeholder="••••••••"/></div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary">Update Password</button>
            <button class="btn btn-danger">Deactivate Account</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
