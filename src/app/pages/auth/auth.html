<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="big">💰 SpendSmart</div>
      <div class="sub">Track. Visualize. Save. Grow.</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab" [class.active]="activeTab === 'login'" (click)="switchTab('login')">Sign In</button>
      <button class="auth-tab" [class.active]="activeTab === 'register'" (click)="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    @if (activeTab === 'login') {
      <div>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input class="form-control" type="email" placeholder="you@example.com" value="john@example.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" placeholder="••••••••" value="password123"/>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" (click)="doLogin()">Sign In</button>
        <div class="auth-divider">or</div>
        <button class="auth-google" (click)="doLogin()">🔵 Continue with Google</button>
      </div>
    }

    <!-- Register Form -->
    @if (activeTab === 'register') {
      <div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">First Name</label><input class="form-control" placeholder="John"/></div>
          <div class="form-group"><label class="form-label">Last Name</label><input class="form-control" placeholder="Doe"/></div>
        </div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" placeholder="you@example.com"/></div>
        <div class="form-group"><label class="form-label">Password</label><input class="form-control" type="password" placeholder="Min 8 characters"/></div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" (click)="doLogin()">Create Account</button>
        <div class="auth-divider">or</div>
        <button class="auth-google" (click)="doLogin()">🔵 Continue with Google</button>
      </div>
    }
  </div>
</div>
