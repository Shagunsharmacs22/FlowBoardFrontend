<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="big">SpendSmart</div>
      <div class="sub">Track. Visualize. Save. Grow.</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab" [class.active]="activeTab === 'login'" (click)="switchTab('login')">Sign In</button>
      <button class="auth-tab" [class.active]="activeTab === 'register'" (click)="switchTab('register')">Register</button>
    </div>

    @if (errorMessage) {
      <div style="background:#fee2e2;color:#991b1b;padding:12px;border-radius:10px;font-size:13px;margin-bottom:14px">
        {{ errorMessage }}
      </div>
    }

    @if (activeTab === 'login') {
      <div>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input class="form-control" type="email" placeholder="you@example.com" [(ngModel)]="loginForm.email" name="loginEmail" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" placeholder="Enter your password" [(ngModel)]="loginForm.password" name="loginPassword" />
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" (click)="doLogin()" [disabled]="loading">
          {{ loading ? 'Signing In...' : 'Sign In' }}
        </button>
        <div class="auth-divider">or</div>
        <button type="button" class="auth-google" (click)="loginWithGoogle()" [disabled]="loading">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </div>
    }

    @if (activeTab === 'register') {
      <div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input class="form-control" [(ngModel)]="registerForm.firstName" name="firstName" placeholder="First name" />
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input class="form-control" [(ngModel)]="registerForm.lastName" name="lastName" placeholder="Last name" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" [(ngModel)]="registerForm.email" name="registerEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-control" type="password" [(ngModel)]="registerForm.password" name="registerPassword" placeholder="Min 8 characters" />
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:8px" (click)="doRegister()" [disabled]="loading">
          {{ loading ? 'Creating...' : 'Create Account' }}
        </button>
        <div class="auth-divider">or</div>
        <button type="button" class="auth-google" (click)="loginWithGoogle()" [disabled]="loading">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign up with Google
        </button>
      </div>
    }
  </div>
</div>
